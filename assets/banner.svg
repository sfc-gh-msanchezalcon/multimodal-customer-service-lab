<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#29B5E8"/>
      <stop offset="50%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="250" r="120" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="50" r="150" fill="rgba(255,255,255,0.05)"/>
  <circle cx="600" cy="300" r="200" fill="rgba(255,255,255,0.03)"/>
  
  <!-- Audio waveform decoration -->
  <g transform="translate(50, 140)" fill="rgba(255,255,255,0.2)">
    <rect x="0" y="10" width="4" height="20" rx="2"/>
    <rect x="8" y="5" width="4" height="30" rx="2"/>
    <rect x="16" y="0" width="4" height="40" rx="2"/>
    <rect x="24" y="8" width="4" height="24" rx="2"/>
    <rect x="32" y="12" width="4" height="16" rx="2"/>
  </g>
  
  <!-- Document icon decoration -->
  <g transform="translate(1100, 120)" fill="rgba(255,255,255,0.2)">
    <rect x="0" y="0" width="40" height="50" rx="4"/>
    <rect x="8" y="12" width="24" height="3" rx="1"/>
    <rect x="8" y="20" width="20" height="3" rx="1"/>
    <rect x="8" y="28" width="24" height="3" rx="1"/>
    <rect x="8" y="36" width="16" height="3" rx="1"/>
  </g>
  
  <!-- Main title -->
  <text x="600" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="white">
    Multimodal Customer Service Analytics
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="rgba(255,255,255,0.9)">
    Hands-on Snowflake Cortex AI Workshop
  </text>
  
  <!-- Accent line -->
  <rect x="450" y="165" width="300" height="4" rx="2" fill="url(#accentGrad)"/>
  
  <!-- Tech badges - wider with more padding -->
  <g transform="translate(185, 200)">
    <!-- Badge 1: Audio -->
    <g>
      <rect x="0" y="0" width="155" height="32" rx="16" fill="rgba(255,255,255,0.15)"/>
      <text x="77" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="white">🎙️ AI_TRANSCRIBE</text>
    </g>
    <!-- Badge 2: Sentiment -->
    <g transform="translate(165, 0)">
      <rect x="0" y="0" width="150" height="32" rx="16" fill="rgba(255,255,255,0.15)"/>
      <text x="75" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="white">💬 AI_SENTIMENT</text>
    </g>
    <!-- Badge 3: Classify -->
    <g transform="translate(325, 0)">
      <rect x="0" y="0" width="140" height="32" rx="16" fill="rgba(255,255,255,0.15)"/>
      <text x="70" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="white">🏷️ AI_CLASSIFY</text>
    </g>
    <!-- Badge 4: Streamlit -->
    <g transform="translate(475, 0)">
      <rect x="0" y="0" width="130" height="32" rx="16" fill="rgba(255,255,255,0.15)"/>
      <text x="65" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="white">📊 Streamlit</text>
    </g>
    <!-- Badge 5: Duration -->
    <g transform="translate(615, 0)">
      <rect x="0" y="0" width="135" height="32" rx="16" fill="url(#accentGrad)"/>
      <text x="67" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="white">⏱️ Duration 2h</text>
    </g>
  </g>
  
  <!-- Snowflake logo placeholder -->
  <g transform="translate(30, 20)">
    <text font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">❄️ SNOWFLAKE</text>
  </g>
</svg>
